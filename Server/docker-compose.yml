services:
  tcpapi:
    build: .
    ports:
      - "9000:9000"
      - "5000:5000"
    environment:
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=clamshell;Username=postgres;Password=yourpassword
      - ASPNETCORE_URLS=http://+:5000
      - XCHACHA20POLY1305_KEY=39F6AE55B5A83E007B4A8911AFF7A515725CF97711B0B3B51E324B03A313B2EC # CHANGE BEFORE USE!
      - XCHACHA20POLY1305_NONCE=0B9CCF526C1E460D084045649A513A615647AD3D2AB71EA6 # CHANGE BEFORE USE!
      - TCP_HOST=127.0.0.1
      - TCP_PORT=9000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=clamshell
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=yourpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: